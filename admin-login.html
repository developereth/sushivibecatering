<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Sushi Vibe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: #111111;
      padding: 2.5rem;
      border-radius: 28px;
      border: 1px solid #e31b23;
      width: 100%;
      max-width: 400px;
      margin: 1rem;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .login-header i {
      font-size: 3rem;
      color: #e31b23;
      margin-bottom: 1rem;
    }
    
    .login-header h1 {
      color: white;
      font-size: 1.8rem;
    }
    
    .login-header p {
      color: #aaaaaa;
      margin-top: 0.5rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      color: #e5e5e5;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #e31b23;
    }
    
    .btn-login {
      width: 100%;
      background: #e31b23;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .btn-login:hover {
      background: #b8151c;
    }
    
    .error-message {
      background: #ffe6e5;
      color: #c93a3a;
      padding: 0.8rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
    
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    
    .back-link a {
      color: #e31b23;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-user-shield"></i>
      <h1>Admin Access</h1>
      <p>Enter your credentials to manage orders</p>
    </div>
    
    <div id="errorMsg" class="error-message"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="admin@example.com" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Login to Dashboard
      </button>
    </form>
    
    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>
  
  <script src="js/firebase-config.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        sessionStorage.setItem('adminLoggedIn', 'true');
        sessionStorage.setItem('adminLoginTime', Date.now());
        window.location.href = 'admin.html';
      } catch (error) {
        errorMsg.textContent = '❌ Invalid email or password. Please try again.';
        errorMsg.style.display = 'block';
        setTimeout(() => {
          errorMsg.style.display = 'none';
        }, 3000);
      }
    });
  </script>
</body>
</html>
