<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Sushi Vibe</title>
  <script>
    // Check authentication
    if (!sessionStorage.getItem('adminLoggedIn')) {
      window.location.href = 'admin-login.html';
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .admin-header { background: #000000; border-bottom: 2px solid #e31b23; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    .logo i { color: #e31b23; }
    .stats { display: flex; gap: 2rem; }
    .stat-card { background: #111111; padding: 0.5rem 1rem; border-radius: 12px; text-align: center; border: 1px solid #2a2a2a; }
    .stat-number { font-size: 1.5rem; font-weight: bold; color: #e31b23; }
    .logout-btn, .refresh-btn { background: #e31b23; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
    .search-box input { padding: 0.5rem 1rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 40px; color: white; width: 250px; }
    .orders-table { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #111111; border-radius: 16px; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #2a2a2a; }
    th { background: #1a1a1a; color: #e31b23; }
    tr:hover { background: #1a1a1a; }
    .status-pending { background: #856404; color: #fff3cd; display: inline-block; padding: 0.25rem 0.75rem; border-radius: 40px; font-size: 0.75rem; }
    .status-confirmed { background: #0c5460; color: #d1ecf1; display: inline-block; padding: 0.25rem 0.75rem; border-radius: 40px; font-size: 0.75rem; }
    .empty-state { text-align: center; padding: 3rem; color: #888; }
    @media (max-width: 768px) { th, td { padding: 0.5rem; font-size: 0.8rem; } }
  </style>
</head>
<body>
<div id="adminContent">
  <div class="admin-header">
    <div class="logo"><i class="fas fa-fish"></i> Sushi Vibe | Orders</div>
    <div class="stats">
      <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div>Total Orders</div></div>
      <div class="stat-card"><div class="stat-number" id="pendingOrders">0</div><div>Pending</div></div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
  <div class="container">
    <div class="filters">
      <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search by name or phone..."></div>
      <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="orders-table">
      <table id="ordersTable">
        <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Phone</th><th>Package</th><th>Price</th><th>Event Date</th><th>Status</th></tr></thead>
        <tbody id="ordersBody"><tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading orders...</td></tr></tbody>
      68
    </div>
  </div>
</div>

<script>
  const TALLY_API_KEY = "tly-iAqJjdndiUEloygJ2j5ayB62Ajc8gIfk";
  const TALLY_FORM_ID = "81Ajp5";
  
  let allOrders = [];
  let currentSearch = '';

  function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    window.location.href = 'admin-login.html';
  }

  async function loadOrders() {
    const tbody = document.getElementById('ordersBody');
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading orders...</td></tr>';
    
    try {
      const response = await fetch(`https://api.tally.so/forms/${TALLY_FORM_ID}/submissions`, {
        headers: { 'Authorization': `Bearer ${TALLY_API_KEY}` }
      });
      
      if (!response.ok) throw new Error('API error');
      
      const data = await response.json();
      allOrders = data.submissions || [];
      
      // Debug: Log to console so you can see actual field names
      if (allOrders.length > 0) {
        console.log('=== FIRST ORDER RAW DATA ===');
        console.log(allOrders[0]);
        console.log('=== ANSWERS OBJECT ===');
        console.log(allOrders[0].answers);
      }
      
      updateStats();
      displayOrders();
      
    } catch(error) {
      console.error('Error:', error);
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">❌ Error loading orders. Check console for details.</td></tr>';
    }
  }

  function updateStats() {
    document.getElementById('totalOrders').textContent = allOrders.length;
    const pending = allOrders.filter(o => o.status !== 'confirmed').length;
    document.getElementById('pendingOrders').textContent = pending;
  }

  // Helper to extract field value from answers object
  function getFieldValue(answers, possibleNames) {
    if (!answers) return 'N/A';
    for (const name of possibleNames) {
      if (answers[name] && answers[name].value !== undefined && answers[name].value !== null && answers[name].value !== '') {
        return answers[name].value;
      }
      // Also check for direct string values
      if (answers[name] && typeof answers[name] === 'string') {
        return answers[name];
      }
    }
    return 'N/A';
  }

  function displayOrders() {
    const tbody = document.getElementById('ordersBody');
    let filtered = allOrders;
    
    if (currentSearch) {
      const search = currentSearch.toLowerCase();
      filtered = allOrders.filter(o => {
        const answers = o.answers || {};
        const name = getFieldValue(answers, ['full_name', 'name', 'Full Name', 'fullName', 'FullName']);
        const phone = getFieldValue(answers, ['phone', 'Phone', 'Phone Number', 'phonenumber']);
        return name.toLowerCase().includes(search) || phone.includes(search);
      });
    }
    
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">📭 No orders found</td></tr>';
      return;
    }
    
    tbody.innerHTML = filtered.map(order => {
      const answers = order.answers || {};
      
      // Try to find values with multiple possible field names
      const orderId = order.submissionId || order.id || 'N/A';
      const date = new Date(order.createdAt).toLocaleDateString();
      const customerName = getFieldValue(answers, ['full_name', 'name', 'Full Name', 'fullName', 'FullName']);
      const phone = getFieldValue(answers, ['phone', 'Phone', 'Phone Number', 'phonenumber']);
      const packageName = getFieldValue(answers, ['package', 'Package', 'select_package', 'Select Package', 'package_name']);
      const price = getFieldValue(answers, ['price', 'Price', 'package_price', 'total_price']);
      const eventDate = getFieldValue(answers, ['event_date', 'eventDate', 'Event Date', 'delivery_date']);
      
      return `
        <tr>
          <td><strong>${escapeHtml(orderId)}</strong></td>
          <td>${escapeHtml(date)}</td>
          <td>${escapeHtml(customerName)}</td>
          <td>${escapeHtml(phone)}</td>
          <td>${escapeHtml(packageName)}</td>
          <td>${price !== 'N/A' ? escapeHtml(price) + ' ETB' : 'N/A'}</td>
          <td>${escapeHtml(eventDate)}</td>
          <td><span class="status-pending">PENDING</span></td>
        </tr>
      `;
    }).join('');
  }

  document.getElementById('searchInput')?.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    displayOrders();
  });

  function escapeHtml(text) {
    if (!text || text === 'N/A') return 'N/A';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Load orders when page loads
  loadOrders();
</script>
</body>
</html>
