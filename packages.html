<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu – Coming Soon | Sushi Vibe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0a0505 0%, #1a0808 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .construction-card {
      max-width: 650px;
      width: 100%;
      background: #0f0707;
      border-radius: 48px;
      border: 2px dashed #e31b23;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(227, 27, 35, 0.2);
      text-align: center;
      padding: 3rem 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(227, 27, 35, 0.2); }
      50% { box-shadow: 0 0 30px 5px rgba(227, 27, 35, 0.3); }
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      color: #e31b23;
      margin-bottom: 1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .message {
      font-size: 1.3rem;
      color: #f0d8c0;
      line-height: 1.5;
      font-weight: 400;
    }

    .back-link {
      display: inline-block;
      margin-top: 2rem;
      color: #ff8a5c;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .back-link:hover {
      color: #e31b23;
    }
  </style>
</head>
<body>
  <div class="construction-card">
    <div class="emoji">🍣🔨</div>
    <h1>Under Construction</h1>
    <div class="message">
      This menu page is currently being built.
    </div>
    <a href="https://sushivibecatering.pages.dev/" class="back-link">← Back to homepage</a>
  </div>
</body>
</html>
