<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | SUSHI VIBE</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/developereth/sushivibecatering/bdc64d84327d2b959f4e5cb9eb93da0615bcc838/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --sushi-red: #e31b23;
            --sushi-black: #0a0a0a;
            --sushi-dark: #1a1a1a;
            --sushi-gold: #f5c518;
            --white: #ffffff;
            --gray-mid: #b0b0b0;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Poppins', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--sushi-black); color: var(--white); min-height: 100vh; }
        
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: var(--sushi-dark); border: 2px solid var(--sushi-red); border-radius: 24px; padding: 40px 30px; max-width: 420px; width: 100%; text-align: center; }
        .login-card h1 { color: var(--sushi-red); font-family: var(--font-heading); font-size: 28px; margin-bottom: 8px; }
        .login-card p { color: var(--gray-mid); font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 13px; background: #0a0a0a; border: 1px solid rgba(227,27,35,0.3); color: white; border-radius: 12px; margin-bottom: 14px; }
        input:focus { outline: none; border-color: var(--sushi-red); }
        button { padding: 14px; background: var(--sushi-red); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        button:hover { background: #b8161f; }
        .message { margin-top: 14px; font-size: 14px; }
        .error { color: #f44336; }
        
        #dashboardScreen { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .header { background: var(--sushi-dark); border: 2px solid var(--sushi-red); border-radius: 20px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: var(--sushi-red); font-family: var(--font-heading); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 13px; }
        .btn-refresh { background: #2196F3; color: white; }
        .btn-logout { background: #dc3545; color: white; }
        .btn-portal { background: var(--sushi-red); color: white; text-decoration: none; display: inline-block; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--sushi-dark); border: 1px solid rgba(227,27,35,0.2); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-card h3 { color: var(--sushi-red); font-size: 32px; font-family: var(--font-heading); }
        .stat-card p { color: var(--gray-mid); font-size: 13px; }
        
        .card { background: var(--sushi-dark); border: 1px solid rgba(227,27,35,0.2); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card h3 { color: var(--sushi-red); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: var(--sushi-red); text-align: left; padding: 10px 8px; border-bottom: 2px solid var(--sushi-red); }
        td { padding: 10px 8px; border-bottom: 1px solid #333; }
        .action-btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin: 2px; color: white; }
        .confirm-btn { background: #4CAF50; }
        .delete-btn { background: #dc3545; }
        .badge-confirmed { background: #1a3a1a; color: #4CAF50; padding: 4px 10px; border-radius: 20px; font-size: 11px; display: inline-block; }
        .badge-pending { background: #3a2a1a; color: #FF9800; padding: 4px 10px; border-radius: 20px; font-size: 11px; display: inline-block; }
        
        .manual-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .manual-form input, .manual-form select { margin-bottom: 0; }
        
        @media (max-width: 768px) { table { font-size: 11px; } th, td { padding: 6px 4px; } }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <h1>🍣 SUSHI VIBE</h1>
            <p>Admin Order Management</p>
            <input type="text" id="adminUser" placeholder="Username" value="admin">
            <input type="password" id="adminPass" placeholder="Password" value="admin123">
            <button onclick="login()">🔐 Login</button>
            <div id="loginMsg" class="message"></div>
            <p style="margin-top: 15px; font-size: 12px; color: #666;">Demo: admin / admin123</p>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboardScreen">
        <div class="header">
            <h1><i class="fas fa-sushi"></i> Sushi Vibe - Orders</h1>
            <div class="btn-group">
                <button class="btn btn-refresh" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn" style="background:#4CAF50;" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
                <a href="index.html" class="btn btn-portal"><i class="fas fa-home"></i> Website</a>
                <button class="btn btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card"><h3 id="totalOrders">0</h3><p>Total Orders</p></div>
            <div class="stat-card"><h3 id="pendingOrders">0</h3><p>Pending</p></div>
            <div class="stat-card"><h3 id="confirmedOrders">0</h3><p>Confirmed</p></div>
            <div class="stat-card"><h3 id="totalRevenue">0</h3><p>Revenue (ETB)</p></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-list"></i> Customer Orders</h3>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>#</th><th>Date</th><th>Name</th><th>Phone</th><th>Package</th><th>Event Date</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="ordersTable">
                        <tr><td colspan="8" style="text-align:center;">Loading orders...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> Add Manual Order (Phone/WhatsApp)</h3>
            <div class="manual-form">
                <input type="text" id="manualName" placeholder="Full Name *">
                <input type="tel" id="manualPhone" placeholder="Phone *">
                <select id="manualPackage">
                    <option value="The Addition">The Addition - 14,500 ETB</option>
                    <option value="The Entourage">The Entourage - 26,000 ETB</option>
                    <option value="The Dynasty">The Dynasty - 36,000 ETB</option>
                </select>
                <input type="date" id="manualEventDate">
                <select id="manualStatus">
                    <option value="pending">⏳ Pending</option>
                    <option value="confirmed">✅ Confirmed</option>
                </select>
                <button onclick="addManualOrder()" style="background:#4CAF50;">➕ Add Order</button>
            </div>
            <div id="manualMsg" style="margin-top: 10px; font-size: 13px;"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'sushi_orders';
        
        function login() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const msg = document.getElementById('loginMsg');
            
            if (user === 'admin' && pass === 'admin123') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                loadOrders();
                msg.innerHTML = '';
            } else {
                msg.innerHTML = '❌ Invalid credentials. Use admin / admin123';
                msg.className = 'message error';
            }
        }
        
        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('adminUser').value = 'admin';
            document.getElementById('adminPass').value = 'admin123';
        }
        
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const table = document.getElementById('ordersTable');
            
            if (orders.length === 0) {
                table.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#888;">No orders yet. Submit a test order from the website!</td></tr>';
                document.getElementById('totalOrders').textContent = '0';
                document.getElementById('pendingOrders').textContent = '0';
                document.getElementById('confirmedOrders').textContent = '0';
                document.getElementById('totalRevenue').textContent = '0';
                return;
            }
            
            let pending = 0, confirmed = 0, revenue = 0;
            table.innerHTML = '';
            
            // Show newest first
            [...orders].reverse().forEach((order, idx) => {
                const status = order.status || 'pending';
                if (status === 'pending') pending++;
                if (status === 'confirmed') {
                    confirmed++;
                    let price = 0;
                    if (order.package === 'The Addition') price = 14500;
                    else if (order.package === 'The Entourage') price = 26000;
                    else if (order.package === 'The Dynasty') price = 36000;
                    revenue += price;
                }
                
                const statusHtml = status === 'confirmed' ? '<span class="badge-confirmed">✅ Confirmed</span>' : '<span class="badge-pending">⏳ Pending</span>';
                const date = order.date ? new Date(order.date).toLocaleDateString() : 'N/A';
                const eventDate = order.eventDate || 'TBD';
                const originalIndex = orders.length - 1 - idx;
                
                table.innerHTML += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td>${date}</td>
                        <td>${escapeHtml(order.name || 'N/A')}</td>
                        <td>${escapeHtml(order.phone || 'N/A')}</td>
                        <td>${order.package || 'N/A'}</td>
                        <td>${eventDate}</td>
                        <td>${statusHtml}</td>
                        <td>
                            ${status !== 'confirmed' ? `<button class="action-btn confirm-btn" onclick="confirmOrder(${originalIndex})">✅ Confirm</button>` : ''}
                            <button class="action-btn delete-btn" onclick="deleteOrder(${originalIndex})">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('pendingOrders').textContent = pending;
            document.getElementById('confirmedOrders').textContent = confirmed;
            document.getElementById('totalRevenue').textContent = revenue.toLocaleString();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function confirmOrder(index) {
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if (orders[index]) {
                orders[index].status = 'confirmed';
                localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
                loadOrders();
                showToast('✅ Order confirmed!', '#4CAF50');
            }
        }
        
        function deleteOrder(index) {
            if (confirm('Delete this order?')) {
                const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                orders.splice(index, 1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
                loadOrders();
                showToast('🗑️ Order deleted', '#dc3545');
            }
        }
        
        function addManualOrder() {
            const name = document.getElementById('manualName').value.trim();
            const phone = document.getElementById('manualPhone').value.trim();
            const packageVal = document.getElementById('manualPackage').value;
            const eventDate = document.getElementById('manualEventDate').value;
            const status = document.getElementById('manualStatus').value;
            
            if (!name || !phone) {
                document.getElementById('manualMsg').innerHTML = '❌ Name and phone required';
                document.getElementById('manualMsg').style.color = '#f44336';
                return;
            }
            
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            orders.push({
                name: name,
                phone: phone,
                package: packageVal,
                eventDate: eventDate,
                status: status,
                date: new Date().toISOString(),
                source: 'manual'
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
            
            document.getElementById('manualName').value = '';
            document.getElementById('manualPhone').value = '';
            document.getElementById('manualEventDate').value = '';
            document.getElementById('manualMsg').innerHTML = '✅ Order added successfully!';
            document.getElementById('manualMsg').style.color = '#4CAF50';
            loadOrders();
            setTimeout(() => { document.getElementById('manualMsg').innerHTML = ''; }, 3000);
        }
        
        function exportCSV() {
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if (orders.length === 0) {
                alert('No orders to export');
                return;
            }
            
            let csv = 'Date,Name,Phone,Package,Event Date,Status,Source\n';
            orders.forEach(order => {
                csv += `"${order.date || ''}","${order.name || ''}","${order.phone || ''}","${order.package || ''}","${order.eventDate || ''}","${order.status || 'pending'}","${order.source || 'website'}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sushi_orders_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function showToast(msg, color) {
            const toast = document.createElement('div');
            toast.innerHTML = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.background = color;
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '8px';
            toast.style.zIndex = '9999';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Debug - show storage info
        console.log('Admin Portal Loaded');
        console.log('Orders in storage:', JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    </script>
</body>
</html>
