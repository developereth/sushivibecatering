<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Sushi Vibe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    
    .admin-header {
      background: #000000;
      border-bottom: 2px solid #e31b23;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    .logo i { color: #e31b23; }
    .stats { display: flex; gap: 2rem; }
    .stat-card { background: #111111; padding: 0.5rem 1rem; border-radius: 12px; text-align: center; border: 1px solid #2a2a2a; }
    .stat-number { font-size: 1.5rem; font-weight: bold; color: #e31b23; }
    .logout-btn, .refresh-btn { background: #e31b23; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
    .search-box input { padding: 0.5rem 1rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 40px; color: white; width: 250px; }
    .orders-table { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #111111; border-radius: 16px; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #2a2a2a; }
    th { background: #1a1a1a; color: #e31b23; }
    tr:hover { background: #1a1a1a; }
    .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 40px; font-size: 0.75rem; }
    .status-pending { background: #856404; color: #fff3cd; }
    .status-confirmed { background: #0c5460; color: #d1ecf1; }
    .action-btn { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
    .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-box { background: #111111; padding: 2rem; border-radius: 28px; border: 1px solid #e31b23; width: 100%; max-width: 400px; }
    .login-box input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: white; }
    .login-box button { width: 100%; background: #e31b23; color: white; border: none; padding: 0.8rem; border-radius: 12px; cursor: pointer; }
    @media (max-width: 768px) { th, td { padding: 0.5rem; font-size: 0.8rem; } .stats { gap: 1rem; } }
  </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2 style="text-align:center; margin-bottom:1.5rem;"><i class="fas fa-user-shield"></i> Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <div id="loginError" style="color:#dc3545; text-align:center; margin-top:1rem; display:none;"></div>
  </div>
</div>

<div id="adminContent" style="display:none;">
  <div class="admin-header">
    <div class="logo"><i class="fas fa-fish"></i> Sushi Vibe | Orders</div>
    <div class="stats">
      <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div>Total Orders</div></div>
      <div class="stat-card"><div class="stat-number" id="pendingOrders">0</div><div>Pending</div></div>
    </div>
    <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
  </div>
  <div class="container">
    <div class="filters">
      <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search by name or phone..."></div>
    </div>
    <div class="orders-table">
      <table id="ordersTable">
        <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Phone</th><th>Package</th><th>Price</th><th>Event Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="ordersBody"><tr><td colspan="9" style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin"></i> Loading orders...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = "SushiVibe2025";
  
  // Tally API - Fetch responses
  const TALLY_FORM_ID = "81Ajp5";
  const TALLY_API_KEY = "YOUR_TALLY_API_KEY"; // Get from Tally settings
  
  let allOrders = [];
  let currentSearch = '';

  function login() {
    const pwd = document.getElementById('adminPassword').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadOrders();
    } else {
      const err = document.getElementById('loginError');
      err.textContent = '❌ Incorrect password';
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  }

  if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadOrders();
  }

  async function loadOrders() {
    const tbody = document.getElementById('ordersBody');
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin"></i> Loading orders...</td></tr>';
    
    try {
      // Fetch from Tally API
      const response = await fetch(`https://api.tally.so/forms/${TALLY_FORM_ID}/submissions`, {
        headers: { 'Authorization': `Bearer ${TALLY_API_KEY}` }
      });
      
      if (!response.ok) throw new Error('Tally API error');
      
      const data = await response.json();
      allOrders = data.submissions || [];
      updateStats();
      displayOrders();
      
    } catch(error) {
      console.error('Error loading orders:', error);
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:2rem;">❌ Error loading orders. Please check Tally API key.</td></tr>';
    }
  }

  function updateStats() {
    document.getElementById('totalOrders').textContent = allOrders.length;
    const pending = allOrders.filter(o => o.status !== 'confirmed').length;
    document.getElementById('pendingOrders').textContent = pending;
  }

  function displayOrders() {
    const tbody = document.getElementById('ordersBody');
    let filtered = allOrders;
    
    if (currentSearch) {
      const search = currentSearch.toLowerCase();
      filtered = allOrders.filter(o => 
        (o.answers?.full_name?.value?.toLowerCase().includes(search)) ||
        (o.answers?.phone?.value?.includes(search))
      );
    }
    
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:2rem;">📭 No orders found</td></tr>';
      return;
    }
    
    tbody.innerHTML = filtered.map(order => {
      const answers = order.answers || {};
      return `
        <tr>
          <td><strong>${order.submissionId || 'N/A'}</strong></td>
          <td>${new Date(order.createdAt).toLocaleDateString()}</td>
          <td>${escapeHtml(answers.full_name?.value || 'N/A')}</td>
          <td>${answers.phone?.value || 'N/A'}</td>
          <td>${answers.package?.value || 'N/A'}</td>
          <td>${answers.price?.value || 'N/A'} ETB</td>
          <td>${answers.event_date?.value || 'N/A'}</td>
          <td><span class="status status-pending">PENDING</span></td>
          <td><button class="action-btn" onclick="markConfirmed('${order.submissionId}')">✅ Confirm</button></td>
        </tr>
      `;
    }).join('');
  }

  async function markConfirmed(orderId) {
    // This would update status in Tally (requires Tally API update)
    alert('Status update requires Tally API write access. For now, use Tally dashboard.');
    loadOrders();
  }

  document.getElementById('searchInput')?.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    displayOrders();
  });

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
