<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Sushi Vibe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .admin-header { background: #000000; border-bottom: 2px solid #e31b23; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    .logo i { color: #e31b23; }
    .logout-btn { background: #e31b23; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .iframe-container { background: #111111; border-radius: 24px; padding: 1rem; border: 1px solid #e31b23; margin-top: 1rem; }
    iframe { width: 100%; height: 85vh; border-radius: 16px; background: white; }
    h2 { color: #e31b23; margin-bottom: 0.5rem; }
    .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-box { background: #111111; padding: 2rem; border-radius: 28px; border: 1px solid #e31b23; width: 100%; max-width: 400px; text-align: center; }
    .login-box input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: white; }
    .login-box button { width: 100%; background: #e31b23; color: white; border: none; padding: 0.8rem; border-radius: 12px; cursor: pointer; }
    .error { color: #dc3545; margin-top: 1rem; display: none; }
  </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div id="adminContent" style="display:none;">
  <div class="admin-header">
    <div class="logo"><i class="fas fa-fish"></i> Sushi Vibe | Orders</div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
  <div class="container">
    <h2><i class="fas fa-clipboard-list"></i> Order Management</h2>
    <p>View and manage all customer orders below</p>
    <div class="iframe-container">
      <iframe src="https://tally.so/r/81Ajp5?view=responses" title="Order Dashboard"></iframe>
    </div>
  </div>
</div>

<script>
  function login() {
    const pwd = document.getElementById('adminPassword').value;
    if (pwd === 'SushiVibe2025') {
      sessionStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
    } else {
      document.getElementById('loginError').textContent = '❌ Incorrect password';
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    window.location.reload();
  }

  if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
  }
</script>
</body>
</html>
