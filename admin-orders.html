<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Sushi Vibe Orders</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background: #0a0a0a; color: white; padding: 20px; }
    table { width: 100%; border-collapse: collapse; background: #111; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #e31b23; }
    .pending { color: #ffc107; }
    .confirmed { color: #28a745; }
    button { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    .login-box { max-width: 400px; margin: 100px auto; background: #111; padding: 20px; border-radius: 12px; }
    input { width: 100%; padding: 8px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; }
  </style>
</head>
<body>
<div id="login" class="login-box">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="error" style="color:red; display:none;">Wrong password</p>
</div>
<div id="admin" style="display:none;">
  <h1>Orders</h1>
  <table id="ordersTable">
    <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Phone</th><th>Package</th><th>Price</th><th>Event Date</th><th>Status</th><th>Action</th></tr></thead>
    <tbody id="ordersBody"></tbody>
  </table>
</div>
<script>
  const SUPABASE_URL = 'https://kzeiujfatjkbfozoilbw.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_gB0mXUpKk2riYVJdOSfANg_HrT6E8Aw';
  const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  function login() {
    if (document.getElementById('password').value === 'SushiVibe2025') {
      document.getElementById('login').style.display = 'none';
      document.getElementById('admin').style.display = 'block';
      loadOrders();
    } else {
      document.getElementById('error').style.display = 'block';
    }
  }
  
  async function loadOrders() {
    const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
    document.getElementById('ordersBody').innerHTML = data.map(order => `
      <tr>
        <td>${order.order_id}</td>
        <td>${new Date(order.created_at).toLocaleDateString()}</td>
        <td>${order.full_name}</td>
        <td>${order.phone}</td>
        <td>${order.package}</td>
        <td>${order.price} ETB</td>
        <td>${order.event_date}</td>
        <td class="${order.status}">${order.status}</td>
        <td><button onclick="confirmOrder('${order.id}')">Confirm</button></td>
      </tr>
    `).join('');
  }
  
  async function confirmOrder(id) {
    await supabase.from('orders').update({ status: 'confirmed' }).eq('id', id);
    loadOrders();
  }
</script>
</body>
</html>
