<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sushi Vibe | Order</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background: #0a0a0a; color: white; padding: 20px; }
    .form-card { background: #111; padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto; }
    input, select, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; }
    button { background: #e31b23; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: green; color: white; padding: 10px 20px; border-radius: 8px; display: none; }
  </style>
</head>
<body>
  <div class="form-card">
    <h2>Place Your Order</h2>
    <form id="orderForm">
      <input type="text" id="fullName" placeholder="Full Name" required>
      <input type="tel" id="phone" placeholder="Phone" required>
      <input type="email" id="email" placeholder="Email" required>
      
      <select id="package" required>
        <option value="">Select Package</option>
        <option value="Vibe Party Set">Vibe Party Set - 34,999 ETB</option>
        <option value="Celebration Feast">Celebration Feast - 61,999 ETB</option>
        <option value="Ultimate Sushi Experience">Ultimate Sushi Experience - 109,999 ETB</option>
      </select>
      
      <input type="date" id="eventDate" required>
      <input type="time" id="eventTime" required>
      <input type="number" id="guests" placeholder="Number of Guests" required>
      
      <select id="deliveryType">
        <option value="Delivery">Delivery</option>
        <option value="Pickup">Pickup</option>
      </select>
      
      <textarea id="allergies" placeholder="Allergies (or write 'None')" required></textarea>
      
      <button type="submit">Submit Order</button>
    </form>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const SUPABASE_URL = 'https://kzeiujfatjkbfozoilbw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_gB0mXUpKk2riYVJdOSfANg_HrT6E8Aw';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showToast(msg, isError) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.backgroundColor = isError ? '#dc3545' : '#28a745';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 4000);
    }

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const orderData = {
        order_id: 'ORD-' + Date.now(),
        full_name: document.getElementById('fullName').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        package: document.getElementById('package').value,
        price: document.getElementById('package').value === 'Vibe Party Set' ? 34999 : 
               document.getElementById('package').value === 'Celebration Feast' ? 61999 : 109999,
        guests: parseInt(document.getElementById('guests').value),
        event_date: document.getElementById('eventDate').value,
        event_time: document.getElementById('eventTime').value,
        occasion: null,
        delivery_type: document.getElementById('deliveryType').value,
        delivery_address: null,
        allergies: document.getElementById('allergies').value,
        special_requests: null
      };
      
      const btn = document.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      
      const { error } = await supabase.from('orders').insert([orderData]);
      
      if (error) {
        console.error('Error:', error);
        showToast('Error: ' + error.message, true);
      } else {
        showToast('✅ Order placed!', false);
        document.getElementById('orderForm').reset();
      }
      
      btn.disabled = false;
      btn.textContent = 'Submit Order';
    });
  </script>
</body>
</html>
