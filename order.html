<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sushi Vibe | Debug Order Form</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: monospace;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #0a0a0a;
      color: white;
    }
    .form-group { margin-bottom: 15px; }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
    }
    button {
      background: #e31b23;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .debug {
      background: #1a1a1a;
      padding: 10px;
      margin-top: 20px;
      border-radius: 8px;
      font-size: 12px;
      overflow-x: auto;
    }
    .success { color: #28a745; }
    .error { color: #dc3545; }
  </style>
</head>
<body>
  <h1>Sushi Vibe - Debug Order Form</h1>
  
  <form id="orderForm">
    <div class="form-group">
      <label>Package:</label>
      <select id="package" required>
        <option value="">Select Package</option>
        <option value="Vibe Party Set" data-price="34999">Vibe Party Set - 34,999 ETB</option>
        <option value="Celebration Feast" data-price="61999">Celebration Feast - 61,999 ETB</option>
        <option value="Ultimate Sushi Experience" data-price="109999">Ultimate Sushi Experience - 109,999 ETB</option>
      </select>
    </div>

    <div class="form-group">
      <label>Full Name:</label>
      <input type="text" id="fullName" required value="Test Customer">
    </div>

    <div class="form-group">
      <label>Phone:</label>
      <input type="text" id="phone" required value="+251 927 299999">
    </div>

    <div class="form-group">
      <label>Email:</label>
      <input type="email" id="email" required value="test@example.com">
    </div>

    <div class="form-group">
      <label>Guests:</label>
      <input type="number" id="guests" required value="10">
    </div>

    <div class="form-group">
      <label>Event Date:</label>
      <input type="date" id="eventDate" required>
    </div>

    <div class="form-group">
      <label>Event Time:</label>
      <input type="time" id="eventTime" required value="18:00">
    </div>

    <div class="form-group">
      <label>Delivery Type:</label>
      <select id="deliveryType">
        <option value="Delivery">Delivery</option>
        <option value="Pickup">Pickup</option>
      </select>
    </div>

    <div class="form-group">
      <label>Allergies:</label>
      <textarea id="allergies">None</textarea>
    </div>

    <button type="submit">Submit Order</button>
  </form>

  <div class="debug">
    <strong>Debug Console:</strong>
    <div id="debugOutput"></div>
  </div>

  <script>
    // Debug function
    function log(message, type = 'info') {
      const debugDiv = document.getElementById('debugOutput');
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#dc3545' : (type === 'success' ? '#28a745' : '#17a2b8');
      debugDiv.innerHTML += `<div style="color: ${color}; margin: 5px 0;">[${timestamp}] ${message}</div>`;
      console.log(message);
    }

    // Clear previous logs
    document.getElementById('debugOutput').innerHTML = '';
    
    // Supabase configuration
    const SUPABASE_URL = 'https://kzeiujfatjkbfozoilbw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_gB0mXUpKk2riYVJdOSfANg_HrT6E8Aw';
    
    log('🔧 Initializing Supabase...');
    log(`URL: ${SUPABASE_URL}`);
    log(`Key: ${SUPABASE_ANON_KEY.substring(0, 20)}...`);
    
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    log('✅ Supabase client created successfully');

    // Set min date
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);
    const yyyy = tomorrow.getFullYear();
    const mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
    const dd = String(tomorrow.getDate()).padStart(2, '0');
    document.getElementById('eventDate').value = `${yyyy}-${mm}-${dd}`;
    document.getElementById('eventDate').min = `${yyyy}-${mm}-${dd}`;

    // Handle package selection
    const packageSelect = document.getElementById('package');
    let selectedPrice = 0;
    
    packageSelect.addEventListener('change', () => {
      const selected = packageSelect.options[packageSelect.selectedIndex];
      selectedPrice = selected.getAttribute('data-price');
      log(`📦 Package selected: ${packageSelect.value} - ${selectedPrice} ETB`);
    });

    // Form submission
    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      log('🚀 Form submitted! Starting order process...');
      
      // Get values
      const packageName = document.getElementById('package').value;
      const fullName = document.getElementById('fullName').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const guests = parseInt(document.getElementById('guests').value);
      const eventDate = document.getElementById('eventDate').value;
      const eventTime = document.getElementById('eventTime').value;
      const deliveryType = document.getElementById('deliveryType').value;
      const allergies = document.getElementById('allergies').value;
      
      // Validate
      if (!packageName) {
        log('❌ Validation failed: No package selected', 'error');
        alert('Please select a package');
        return;
      }
      
      // Get price from selected option
      const selectedOption = packageSelect.options[packageSelect.selectedIndex];
      const price = parseInt(selectedOption.getAttribute('data-price'));
      
      const orderId = `ORD-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
      
      const orderData = {
        order_id: orderId,
        full_name: fullName,
        phone: phone,
        email: email,
        package: packageName,
        price: price,
        guests: guests,
        event_date: eventDate,
        event_time: eventTime,
        occasion: null,
        delivery_type: deliveryType,
        delivery_address: null,
        allergies: allergies,
        special_requests: null,
        status: 'pending',
        created_at: new Date().toISOString()
      };
      
      log('📝 Order data prepared:');
      log(JSON.stringify(orderData, null, 2));
      
      // Disable button
      const submitBtn = document.querySelector('button');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Submitting...';
      
      try {
        log('💾 Attempting to insert into Supabase...');
        
        const { data, error } = await supabase
          .from('orders')
          .insert([orderData])
          .select();
        
        if (error) {
          log(`❌ Supabase error: ${error.message}`, 'error');
          log(`Error details: ${JSON.stringify(error)}`, 'error');
          alert(`Error: ${error.message}\n\nCheck console for details`);
        } else {
          log('✅ SUCCESS! Order inserted successfully!', 'success');
          log(`📦 Order ID: ${orderId}`, 'success');
          log(`Response data: ${JSON.stringify(data)}`, 'success');
          alert(`✅ Order placed successfully!\n\nOrder ID: ${orderId}\n\nCheck your Supabase table!`);
          
          // Reset form
          document.getElementById('orderForm').reset();
          document.getElementById('package').value = '';
        }
      } catch (err) {
        log(`❌ Exception caught: ${err.message}`, 'error');
        log(`Stack: ${err.stack}`, 'error');
        alert(`Exception: ${err.message}\n\nCheck console for details`);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });
    
    log('✅ Form ready! Fill out and submit to test.', 'success');
    log('💡 Open browser console (F12) for more details');
  </script>
</body>
</html>
